<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --muted: #888880;
    --green: #2ecc71;
    --green-dim: rgba(46,204,113,0.12);
    --green-text: #a8f0c0;
    --red: #e74c3c;
    --red-dim: rgba(231,76,60,0.1);
    --red-text: #f5a0a0;
    --amber: #f39c12;
    --accent: #d4a853;
    --accent-dim: rgba(212,168,83,0.12);
    --radius: 10px;
    --font: 'Space Grotesk', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* TOPBAR */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    gap: 10px; flex-wrap: wrap;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { font-size: 20px; }
  .logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; line-height: 1.2; }
  .logo-sub { font-size: 10px; color: var(--accent); font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .clock { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: 1px; }
  .view-toggle { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .view-btn { padding: 6px 12px; font-size: 11px; font-weight: 700; font-family: var(--font); background: none; border: none; color: var(--muted); cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px; text-transform: uppercase; }
  .view-btn.active { background: var(--accent); color: #0f0f0f; }

  /* LAYOUT */
  .main { padding: 18px 20px; max-width: 1100px; margin: 0 auto; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .stat-val { font-size: 26px; font-weight: 700; font-family: var(--mono); letter-spacing: -1px; }
  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-val.amber { color: var(--amber); }
  .stat-val.accent { color: var(--accent); }

  /* TOOLBAR */
  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 180px; position: relative; }
  .search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 12px 9px 34px; font-family: var(--font); font-size: 13px; color: var(--text); outline: none; transition: border-color 0.15s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; pointer-events: none; }
  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { padding: 8px 12px; font-size: 11px; font-weight: 700; font-family: var(--font); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--muted); cursor: pointer; transition: all 0.15s; letter-spacing: 0.4px; text-transform: uppercase; white-space: nowrap; }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* CATEGORY NAV */
  .cat-nav { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 18px; padding-bottom: 4px; scrollbar-width: none; }
  .cat-nav::-webkit-scrollbar { display: none; }
  .cat-nav-btn { padding: 6px 12px; font-size: 11px; font-weight: 600; font-family: var(--font); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
  .cat-nav-btn:hover { border-color: var(--border2); color: var(--text); }
  .cat-nav-btn.has-out { border-color: rgba(231,76,60,0.4); color: var(--red); }

  /* CATEGORY SECTION */
  .category-section { margin-bottom: 24px; }
  .category-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .category-name { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); white-space: nowrap; }
  .category-line { flex: 1; height: 1px; background: var(--border); }
  .cat-counts { font-size: 10px; font-family: var(--mono); color: var(--muted); white-space: nowrap; }
  .cat-counts .out-count { color: var(--red); }

  /* ITEM GRID */
  .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }

  /* ITEM CARD */
  .item-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--green); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; transition: border-color 0.2s, background 0.2s; cursor: pointer; user-select: none; }
  .item-card:hover { border-color: var(--border2); }
  .item-card.out { border-left-color: var(--red); background: var(--red-dim); }
  .item-info { flex: 1; min-width: 0; cursor: pointer; }
  .item-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.2s; }
  .item-card.out .item-name { color: var(--muted); }
  .item-price { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
  .item-time { color: var(--red); font-size: 10px; margin-top: 1px; font-family: var(--mono); }

  /* TOGGLE */
  .toggle { position: relative; width: 38px; height: 22px; cursor: pointer; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--red-dim); border: 1px solid var(--red); border-radius: 22px; transition: all 0.2s; }
  .toggle-slider::before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: var(--red); border-radius: 50%; transition: all 0.2s; }
  .toggle input:checked + .toggle-slider { background: var(--green-dim); border-color: var(--green); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: var(--green); }
  .toggle input:disabled + .toggle-slider { opacity: 0.5; cursor: not-allowed; }

  /* WAITER VIEW */
  .waiter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .waiter-card { border-radius: var(--radius); padding: 16px 12px; text-align: center; border: 2px solid transparent; transition: all 0.2s; }
  .waiter-card.available { background: rgba(46,204,113,0.1); border-color: rgba(46,204,113,0.4); }
  .waiter-card.out { background: rgba(231,76,60,0.08); border-color: rgba(231,76,60,0.3); opacity: 0.65; }
  .waiter-icon { font-size: 24px; margin-bottom: 6px; display: block; }
  .waiter-card.out .waiter-icon { filter: grayscale(1); }
  .waiter-name { font-size: 12px; font-weight: 600; margin-bottom: 5px; line-height: 1.3; }
  .waiter-card.out .waiter-name { color: var(--muted); text-decoration: line-through; }
  .waiter-status { font-size: 9px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; }
  .waiter-card.available .waiter-status { color: var(--green-text); }
  .waiter-card.out .waiter-status { color: var(--red-text); }

  /* LOGIN */
  .login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: flex; align-items: center; justify-content: center; z-index: 500; }
  .login-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 32px 36px; width: 320px; text-align: center; }
  .login-logo { font-size: 28px; margin-bottom: 8px; }
  .login-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .login-card p { font-size: 12px; color: var(--muted); margin-bottom: 22px; }
  .pin-display { display: flex; gap: 10px; justify-content: center; margin-bottom: 18px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border2); transition: all 0.2s; }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .num-btn { padding: 14px; font-size: 16px; font-weight: 600; font-family: var(--font); background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; transition: all 0.12s; }
  .num-btn:hover { background: var(--border); }
  .num-btn:active { transform: scale(0.95); }
  .num-btn.del { font-size: 13px; color: var(--muted); }
  .num-btn.enter { background: var(--accent); border-color: var(--accent); color: #0f0f0f; }
  .login-error { color: var(--red); font-size: 12px; margin-top: 10px; min-height: 16px; }

  /* LOGOUT BUTTON */
  .logout-btn { padding: 4px 10px; font-size: 10px; font-weight: 600; font-family: var(--font); background: transparent; border: 1px solid var(--border2); border-radius: 6px; color: var(--muted); cursor: pointer; transition: all 0.15s; margin-left: 8px; }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  /* PULSE DOT */
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.75)} }

  /* SYNC BAR */
  .sync-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }

  /* TOAST */
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px 16px; font-size: 12px; font-weight: 600; z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.3s ease; max-width: 260px; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.green { border-left: 3px solid var(--green); }
  .toast.red { border-left: 3px solid var(--red); }

  .restore-btn:hover { background: rgba(231,76,60,0.2); }

  .last-updated { text-align: center; font-size: 10px; color: var(--muted); font-family: var(--mono); padding: 12px 0 4px; }
  .hidden { display: none !important; }

  @media (max-width: 600px) {
    .main { padding: 12px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat-val { font-size: 22px; }
    .waiter-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
    .item-grid { grid-template-columns: 1fr; }

</style>

function init() {
  loadMenu();
  updateStats();
  renderCatNav();
  renderAll();
  startClock();
  checkSession();
  
  // Load initial data from Firestore
  db.collection("restaurant").doc("menu_data").get().then(doc => {
    if (doc.exists && doc.data().items) {
      const data = doc.data();
      menu = DEFAULT_MENU.map(item => {
        const f = data.items.find(x => x.id === item.id);
        return f ? { ...item, status: f.status, outSince: f.outSince || null } : { ...item, status: "available" };
      });
      renderAll();
      updateStats();
    }
    isInitializing = false;
    setupRealtimeSync();
  }).catch(err => {
    console.error("Firestore load error:", err);
    showToast("Firebase connection failed", "red");
  });
  
  setInterval(() => { renderCatNav(); updateStats(); }, 10000);
}

function checkSession() {
  // Use localStorage so login persists across tabs
  if (localStorage.getItem("crescent_manager") === "true") {
    isManager = true;
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("logoutBtn").classList.remove("hidden");
  }
}

// ── STORAGE ────────────────────────────────────────────────────────
function loadMenu() {
  menu = DEFAULT_MENU.map(i => ({ ...i, status: "available" }));
}

function saveMenu() {
  if (syncInProgress) return;
  if (!isManager) return;
  syncInProgress = true;
  
  const menuData = menu.map(i => ({ id: i.id, status: i.status, outSince: i.outSince || null }));
  
  db.collection("restaurant").doc("menu_data").set({
    items: menuData,
    lastUpdated: new Date().toISOString(),
    updatedBy: auth?.currentUser?.uid || "unknown"
  }).then(() => {
    document.getElementById("lastUpdated").textContent =
      "Last saved: " + new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    syncInProgress = false;
  }).catch(err => {
    console.error("Firestore save error:", err);
    showToast("Save failed - check connection", "red");
    syncInProgress = false;
  });
}

function setupRealtimeSync() {
  // Listen for changes from other devices
  db.collection("restaurant").doc("menu_data").onSnapshot((doc) => {
    if (isInitializing) return;
    
    const data = doc.data();
    if (data && data.items && !syncInProgress) {
      syncInProgress = true;
      menu = DEFAULT_MENU.map(item => {
        const f = data.items.find(x => x.id === item.id);
        return f ? { ...item, status: f.status, outSince: f.outSince || null } : { ...item, status: "available" };
      });
      updateStats();
      renderCatNav();
      renderAll();
      showToast("Updated from other device", "green");
      syncInProgress = false;
    }
  }, (err) => {
    console.error("Firestore sync error:", err);
    showToast("Sync error - check connection", "red");
  });
}

// ── TOGGLE (FIXED) ─────────────────────────────────────────────────
function toggleItem(id, event) {
  // Prevent any parent handlers from firing
  if (event) {
    event.stopPropagation();
  }
  
  if (!isManager) {
    showToast("Manager access required", "red");
    if (event && event.target) {
      event.target.checked = !event.target.checked;
    }
    return;
  }
  
  const item = menu.find(i => i.id === id);
  if (!item) return;
  
  if (item.status === "available") {
    item.status = "out";
    item.outSince = new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'});
    showToast("86'd: " + item.name, "red");
  } else {
    item.status = "available";
    item.outSince = null;
    showToast("Restored: " + item.name, "green");
  }
  saveMenu();
  updateStats();
  renderCatNav();
  renderAll();
}

function restoreAll() {
  if (!isManager) {
    showToast("Manager access required", "red");
    return;
  }
  const outCount = menu.filter(i => i.status === "out").length;
  if (outCount === 0) { showToast("All items already available!", "green"); return; }
  if (!confirm("Restore all " + outCount + " items to available?")) return;
  menu.forEach(i => { i.status = "available"; i.outSince = null; });
  saveMenu();
  updateStats();
  renderCatNav();
  renderAll();
  showToast("All " + outCount + " items restored!", "green");
}

// ── RENDER ─────────────────────────────────────────────────────────
function getFiltered() {
  const q = (document.getElementById("searchInput")?.value || "").toLowerCase().trim();
  return menu.filter(item => {
    const mf = currentFilter === "all" || item.status === currentFilter;
    const mq = !q || item.name.toLowerCase().includes(q) || item.cat.toLowerCase().includes(q);
    return mf && mq;
  });
}

function renderAll() {
  currentView === "manager" ? renderManager() : renderWaiter();
}

function renderManager() {
  const filtered = getFiltered();
  const cats = [...new Set(filtered.map(i => i.cat))];
  const el = document.getElementById("managerView");
  if (!filtered.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px;">No items match.</div>';
    return;
  }
  el.innerHTML = cats.map(cat => {
    const items = filtered.filter(i => i.cat === cat);
    const outN = items.filter(i => i.status === "out").length;
    return `<div class="category-section" id="cat-${cat.replace(/\s+/g,'-')}">
      <div class="category-header">
        <span class="category-name">${cat}</span>
        <div class="category-line"></div>
        <span class="cat-counts">${items.length - outN} avail${outN ? ' · <span class="out-count">' + outN + ' 86\'d</span>' : ''}</span>
      </div>
      <div class="item-grid">
        ${items.map(item => `
          <div class="item-card ${item.status}">
            <div class="item-info" onclick="if(isManager) toggleItem(${item.id})">
              <div class="item-name">${item.icon} ${item.name}</div>
              <div class="item-price">${item.price}</div>
              ${item.outSince ? `<div class="item-time">86'd @ ${item.outSince}</div>` : ''}
            </div>
            <label class="toggle">
              <input type="checkbox" data-item-id="${item.id}" ${item.status === "available" ? "checked" : ""} ${!isManager ? "disabled" : ""} onchange="toggleItem(${item.id}, event)">
              <span class="toggle-slider"></span>
            </label>
          </div>`).join("")}
      </div>
    </div>`;
  }).join("");
}

function renderWaiter() {
  const cats = [...new Set(menu.map(i => i.cat))];
  document.getElementById("waiterView").innerHTML = cats.map(cat => {
    const items = menu.filter(i => i.cat === cat);
    return `<div class="category-section">
      <div class="category-header">
        <span class="category-name">${cat}</span>
        <div class="category-line"></div>
      </div>
      <div class="waiter-grid">
        ${items.map(item => `
          <div class="waiter-card ${item.status}">
            <span class="waiter-icon">${item.icon}</span>
            <div class="waiter-name">${item.name}</div>
            <div class="waiter-status">${item.status === "available" ? "Available" : "86'd"}</div>
          </div>`).join("")}
      </div>
    </div>`;
  }).join("");
}

// ── CATEGORY NAV ───────────────────────────────────────────────────
function renderCatNav() {
  const cats = [...new Set(menu.map(i => i.cat))];
  document.getElementById("catNav").innerHTML = cats.map(cat => {
    const hasOut = menu.some(i => i.cat === cat && i.status === "out");
    return `<button class="cat-nav-btn ${hasOut ? 'has-out' : ''}" onclick="scrollToCat('${cat}')">${cat}${hasOut ? ' ●' : ''}</button>`;
  }).join("");
}

function scrollToCat(cat) {
  const id = "cat-" + cat.replace(/\s+/g, '-');
  document.getElementById(id)?.scrollIntoView({behavior:'smooth', block:'start'});
}

// ── STATS ──────────────────────────────────────────────────────────
function updateStats() {
  const avail = menu.filter(i => i.status === "available").length;
  const out = menu.filter(i => i.status === "out").length;
  const cats = new Set(menu.map(i => i.cat)).size;
  document.getElementById("statAvail").textContent = avail;
  document.getElementById("statOut").textContent = out;
  document.getElementById("statCats").textContent = cats;
  document.getElementById("statTotal").textContent = menu.length;
}

document.getElementById("statOut").addEventListener("dblclick", restoreAll);

// ── VIEW SWITCH ────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById("btnManager").classList.toggle("active", v === "manager");
  document.getElementById("btnWaiter").classList.toggle("active", v === "waiter");
  document.getElementById("managerView").classList.toggle("hidden", v !== "manager");
  document.getElementById("waiterView").classList.toggle("hidden", v !== "waiter");
  document.getElementById("managerToolbar").classList.toggle("hidden", v !== "manager");
  document.getElementById("catNav").classList.toggle("hidden", v !== "manager");
  renderAll();
}

// ── FILTER ─────────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderAll();
}

// ── PIN LOGIN (FIXED) ──────────────────────────────────────────────
function numPress(n) {
  if (pin.length >= 4) return;
  pin += n;
  updateDots();
  if (pin.length === 4) setTimeout(doLogin, 120);
}
function numDel() {
  pin = pin.slice(0, -1);
  updateDots();
  document.getElementById("loginError").textContent = "";
}
function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById("d" + i).classList.toggle("filled", i < pin.length);
  }
}
function doLogin() {
  if (pin === MANAGER_PIN) {
    isManager = true;
    localStorage.setItem("crescent_manager", "true");
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("logoutBtn").classList.remove("hidden");
    showToast("Manager access granted", "green");
    pin = "";
    updateDots();
    renderAll();
  } else {
    document.getElementById("loginError").textContent = "Incorrect PIN. Try again.";
    pin = "";
    updateDots();
  }
}

// ── LOGOUT ─────────────────────────────────────────────────────────
function logout() {
  isManager = false;
  localStorage.removeItem("crescent_manager");
  document.getElementById("loginOverlay").style.display = "flex";
  document.getElementById("logoutBtn").classList.add("hidden");
  pin = "";
  updateDots();
  document.getElementById("loginError").textContent = "";
  renderAll();
  showToast("Logged out", "");
}

// ── TOAST ──────────────────────────────────────────────────────────
function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + (type || "");
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove("show"), 3000);
}

// ── CLOCK ──────────────────────────────────────────────────────────
function startClock() {
  const tick = () => document.getElementById("clock").textContent =
    new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  tick(); setInterval(tick, 1000);
}

init();
</script>
